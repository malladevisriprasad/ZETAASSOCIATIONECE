<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZETA Organization</title>

<link rel="icon" type="image/png" href="ZETA_LOGO.png">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#050816;
color:white;
min-height:100vh;
}

/* Header */

.header{
background:#001f3f;
padding:20px;
text-align:center;
border-bottom:2px solid #00ffff;
}

.header h1{
color:#FFD700;
margin-bottom:5px;
}

.header p{
color:white;
}

/* Container */

.container{
width:95%;
max-width:1300px;
margin:30px auto;
}

/* Card */

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,255,0.3);
border-radius:15px;
padding:25px;
box-shadow:0 0 15px rgba(0,255,255,0.2);
}

/* Statistics */

.stats{
display:flex;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.stat-box{
background:#001f3f;
padding:20px;
border-radius:12px;
flex:1;
min-width:200px;
text-align:center;
border:1px solid #00ffff;
}

.stat-box h2{
color:#FFD700;
}

.stat-box p{
margin-top:10px;
}

/* Search */

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:8px;
background:black;
color:white;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#FFD700;
color:#001f3f;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
background:rgba(0,255,255,0.05);
}

/* Buttons */

.btn{
padding:8px 15px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin:2px;
}

.edit{
background:#00cfff;
color:#001f3f;
}

.delete{
background:#ff4d4d;
color:white;
}

.edit:hover{
box-shadow:0 0 10px #00cfff;
}

.delete:hover{
box-shadow:0 0 10px #ff4d4d;
}

/* Navigation */

.bottom-buttons{
margin-top:25px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.nav-btn{
text-decoration:none;
background:#FFD700;
color:#001f3f;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
}

.nav-btn:hover{
background:white;
}

/* Responsive */

@media(max-width:768px){

table{
font-size:12px;
}

th,td{
padding:8px;
}

}

</style>

</head>

<body>

<div class="header">

<h1>ZETA ORGANIZATION</h1>

<p>Registered Members Management</p>

</div>

<div class="container">

<div class="stats">

<div class="stat-box">
<h2 id="totalMembers">0</h2>
<p>Total Members</p>
</div>

<div class="stat-box">
<h2 id="leadershipMembers">0</h2>
<p>Leadership Team</p>
</div>

<div class="stat-box">
<h2 id="generalMembers">0</h2>
<p>General Members</p>
</div>

</div>


<div class="card">

<h2 style="color:#FFD700;margin-bottom:20px;">
Approved Members List
</h2>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search Member Name">

</div>

<table id="memberTable">

<tr>
<th>Name</th>
<th>Roll Number</th>
<th>Branch</th>
<th>Year</th>
<th>Position</th>
<th>Actions</th>
</tr>

</table>

<div class="bottom-buttons">

<a href="admin membership approval.html" class="nav-btn">
← Membership Approval
</a>

<a href="event management.html" class="nav-btn">
Event Management →
</a>

</div>

</div>

</div>

<script>

/* Search */
let approvedMembers =
JSON.parse(localStorage.getItem("approvedMembers")) || [];

document.getElementById("totalMembers").innerText =
approvedMembers.length;

const leadershipPositions = [
"President",
"Vice President",
"Secretary",
"Joint Secretary",
"Financial Department",
"Technical Lead",
"Cultural Coordinator",
"Sports Coordinator",
"Organizing Committee",
"NSS Coordinator"
];

let leadershipCount =
approvedMembers.filter(member =>
leadershipPositions.includes(member.position)
).length;

document.getElementById("leadershipMembers").innerText =
leadershipCount;

document.getElementById("generalMembers").innerText =
approvedMembers.length - leadershipCount;

document.getElementById("searchInput")
.addEventListener("keyup", function(){

let filter =
this.value.toLowerCase();

let rows =
document.querySelectorAll("#memberTable tr");

rows.forEach((row,index)=>{

if(index===0) return;

let text =
row.textContent.toLowerCase();

row.style.display =
text.includes(filter) ? "" : "none";

});

});

/* Edit */

document.querySelectorAll(".edit")
.forEach(button=>{

button.addEventListener("click",()=>{

alert("Edit Member Feature Coming Soon");

});

});

/* Delete */

document.querySelectorAll(".delete")
.forEach(button=>{

button.addEventListener("click",()=>{

if(confirm("Delete this member?")){

button.closest("tr").remove();

}

});

});

</script>

</body>
</html>
