<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZETA Organization</title>

<link rel="icon" type="image/png" href="ZETA_LOGO.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#050816;
color:white;
min-height:100vh;
}

/* Header */

.header{
background:#001f3f;
padding:20px;
text-align:center;
border-bottom:2px solid #00ffff;
}

.header h1{
color:#FFD700;
margin-bottom:5px;
}

.header p{
color:white;
}

/* Container */

.container{
width:95%;
max-width:1200px;
margin:30px auto;
}

/* Card */

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,255,0.3);
border-radius:15px;
padding:25px;
box-shadow:0 0 15px rgba(0,255,255,0.2);
}

/* Search Box */

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:8px;
background:#000;
color:white;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
}

th{
background:#FFD700;
color:#001f3f;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.1);
text-align:center;
}

tr:hover{
background:rgba(0,255,255,0.05);
}

/* Buttons */

.btn{
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin:2px;
}

.approve{
background:#00ff88;
color:#000;
}

.reject{
background:#ff4d4d;
color:white;
}

.approve:hover{
box-shadow:0 0 10px #00ff88;
}

.reject:hover{
box-shadow:0 0 10px #ff4d4d;
}

/* Footer Buttons */

.bottom-buttons{
margin-top:25px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.nav-btn{
text-decoration:none;
background:#FFD700;
color:#001f3f;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
}

.nav-btn:hover{
background:white;
}

@media(max-width:768px){

table{
font-size:12px;
}

th,td{
padding:8px;
}

}

</style>

</head>

<body>

<div class="header">

<h1>ZETA ORGANIZATION</h1>

<p>
Membership Approval System
</p>

</div>

<div class="container">

<div class="card">

<h2 style="color:#FFD700;margin-bottom:20px;">
Pending Membership Applications
</h2>

<div class="search-box">

<input
type="text"
placeholder="Search Member Name...">

</div>

<table>

<tr>
<th>Name</th>
<th>Roll Number</th>
<th>Branch</th>
<th>Year</th>
<th>Position</th>
<th>Action</th>
</tr>

</table>

<div class="bottom-buttons">

<a href="admin dashboard.html" class="nav-btn">
← Dashboard
</a>
<a href="registered.html" class="nav-btn">
 Resgistered members →
</a>
</div>

</div>

</div>

<script>

const approveButtons =
document.querySelectorAll(".approve");

approveButtons.forEach(button => {

button.addEventListener("click", () => {

alert("Member Approved Successfully");

});

});

const rejectButtons =
document.querySelectorAll(".reject");

rejectButtons.forEach(button => {

button.addEventListener("click", () => {

alert("Member Rejected");

});

});

</script>

</body>
</html>
