<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZETA ORGANIZATION</title>

 <link rel="icon" type="image/png" href="ZETA_LOGO.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#081b29;
color:white;
}

.header{
background:#001f3f;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#FFD700;
}

.container{
width:90%;
max-width:1000px;
margin:30px auto;
}

.card{

background:rgba(255,255,255,0.08);

backdrop-filter:blur(10px);

padding:25px;

border-radius:15px;

margin-bottom:25px;

box-shadow:0 0 15px rgba(0,255,255,0.2);

}

.card h2{
color:#FFD700;
margin-bottom:20px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input,textarea,select{

width:100%;

padding:12px;

border:none;

border-radius:8px;

background:#16344f;

color:white;

}

textarea{
height:100px;
resize:none;
}

.theme-box{
display:flex;
gap:20px;
margin-top:10px;
}

.btn{

background:#FFD700;

color:#001f3f;

padding:15px 30px;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

margin:10px;

}

.btn:hover{

background:#00ffff;

}

.bottom{

text-align:center;

margin-top:30px;

}

@media(max-width:768px){

.row{
grid-template-columns:1fr;
}

}

</style>

</head>

value="Zone for Electronics Technologies and Automation">

88th Ward, GVMC, Narava, Visakhapatnam, Andhra Pradesh

<input type="file">

<input type="file">

placeholder="LinkedIn">

<input type="text"

Save Settings

</button>

Back to Dashboard

</button>

</div>

</div>

</body>
</html>
